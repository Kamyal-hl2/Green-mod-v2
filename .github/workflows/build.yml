name: Build Green Engine for GMod Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ============================================================
  # Движок: armeabi-v7a (32-bit ARM)
  # ============================================================
  build-engine-armv7a:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Verify submodules
        run: |
          echo "=== thirdparty ==="
          ls engine/thirdparty/ | head -5 || echo "EMPTY!"
          echo "=== ivp ==="
          ls engine/ivp/ | head -5 || echo "EMPTY!"

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y python3 git build-essential wget unzip \
            libbz2-dev libbz2-dev:i386 libsdl2-dev libfreetype6-dev libfontconfig1-dev \
            libopenal-dev libjpeg-dev libpng-dev libcurl4-gnutls-dev \
            libedit-dev pkg-config g++-multilib libc6-dev-i386

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ndk/android-ndk-r10e
          key: android-ndk-r10e-v3

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ndk && cd ndk
          wget -q --timeout=120 --tries=3 https://dl.google.com/android/repository/android-ndk-r10e-linux-x86_64.zip -O ndk.zip
          unzip -q ndk.zip && rm ndk.zip

      - name: Setup environment
        run: |
          echo "ANDROID_NDK_HOME=${{ github.workspace }}/ndk/android-ndk-r10e" >> $GITHUB_ENV
          echo "NDK_BIN=${{ github.workspace }}/ndk/android-ndk-r10e/toolchains/arm-linux-androideabi-4.9/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV
          echo "SYSROOT=${{ github.workspace }}/ndk/android-ndk-r10e/platforms/android-21/arch-arm" >> $GITHUB_ENV

      - name: Build bzip2
        run: |
          wget -q https://sourceware.org/pub/bzip2/bzip2-1.0.8.tar.gz
          tar -xzf bzip2-1.0.8.tar.gz && cd bzip2-1.0.8
          make libbz2.a \
            CC="$NDK_BIN/arm-linux-androideabi-gcc --sysroot=$SYSROOT" \
            AR="$NDK_BIN/arm-linux-androideabi-ar" \
            RANLIB="$NDK_BIN/arm-linux-androideabi-ranlib" \
            CFLAGS="-fPIC -O2 -Wall -Winline -D_FILE_OFFSET_BITS=64"
          mkdir -p ${{ github.workspace }}/engine/lib/android/arm
          cp libbz2.a ${{ github.workspace }}/engine/lib/android/arm/

      - name: Configure WAF
        working-directory: engine
        run: |
          unset CFLAGS CXXFLAGS LDFLAGS
          python3 waf configure -v -T release --togles --android=armeabi-v7a-hard,4.9,21 --disable-warns

      - name: Build engine
        working-directory: engine
        run: python3 waf build -v -j$(nproc)

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find engine/build -iname "*.so" -exec cp {} artifacts/ \; 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: engine-armv7a
          path: artifacts/
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-armv7a
          path: engine/build/config.log

  # ============================================================
  # Движок: arm64-v8a (64-bit ARM)
  # ============================================================
  build-engine-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y python3 git build-essential wget unzip \
            libbz2-dev libbz2-dev:i386 libsdl2-dev libfreetype6-dev libfontconfig1-dev \
            libopenal-dev libjpeg-dev libpng-dev libcurl4-gnutls-dev \
            libedit-dev pkg-config g++-multilib libc6-dev-i386

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ndk/android-ndk-r10e
          key: android-ndk-r10e-v3

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ndk && cd ndk
          wget -q --timeout=120 --tries=3 https://dl.google.com/android/repository/android-ndk-r10e-linux-x86_64.zip -O ndk.zip
          unzip -q ndk.zip && rm ndk.zip

      - name: Setup environment
        run: |
          echo "ANDROID_NDK_HOME=${{ github.workspace }}/ndk/android-ndk-r10e" >> $GITHUB_ENV
          echo "NDK_BIN=${{ github.workspace }}/ndk/android-ndk-r10e/toolchains/aarch64-linux-android-4.9/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV
          echo "SYSROOT=${{ github.workspace }}/ndk/android-ndk-r10e/platforms/android-21/arch-arm64" >> $GITHUB_ENV

      - name: Build bzip2
        run: |
          wget -q https://sourceware.org/pub/bzip2/bzip2-1.0.8.tar.gz
          tar -xzf bzip2-1.0.8.tar.gz && cd bzip2-1.0.8
          make libbz2.a \
            CC="$NDK_BIN/aarch64-linux-android-gcc --sysroot=$SYSROOT" \
            AR="$NDK_BIN/aarch64-linux-android-ar" \
            RANLIB="$NDK_BIN/aarch64-linux-android-ranlib" \
            CFLAGS="-fPIC -O2 -Wall -Winline -D_FILE_OFFSET_BITS=64"
          mkdir -p ${{ github.workspace }}/engine/lib/android/arm64
          cp libbz2.a ${{ github.workspace }}/engine/lib/android/arm64/

      - name: Configure WAF
        working-directory: engine
        run: |
          unset CFLAGS CXXFLAGS LDFLAGS
          python3 waf configure -v -T release --togles --android=aarch64,4.9,21 --disable-warns

      - name: Build engine
        working-directory: engine
        run: python3 waf build -v -j$(nproc)

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find engine/build -iname "*.so" -exec cp {} artifacts/ \; 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: engine-arm64
          path: artifacts/
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-arm64
          path: engine/build/config.log

  # ============================================================
  # Chromium: armeabi-v7a
  # ============================================================
  build-chromium-armv7a:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 git build-essential wget curl \
            lsb-release software-properties-common gnupg \
            libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 \
            libxdamage1 libxrandr2 libgbm1 libasound2 libpangocairo-1.0-0 \
            libgtk-3-0 ninja-build

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_ENV
          echo "PATH=${{ github.workspace }}/depot_tools:$PATH" >> $GITHUB_ENV

      - name: Fetch Chromium source
        run: |
          mkdir -p chromium && cd chromium
          fetch --nohooks --no-history chromium
          cd src && gclient runhooks

      - name: Configure Chromium for Android ARM
        run: |
          cd chromium/src
          cat > args.gn << 'EOF'
          target_os = "android"
          target_cpu = "arm"
          is_debug = false
          is_component_build = false
          symbol_level = 0
          enable_nacl = false
          proprietary_codecs = true
          ffmpeg_branding = "Chrome"
          use_openh264 = false
          is_clang = true
          treat_warnings_as_errors = false
          use_sysroot = false
          EOF
          gn gen out/arm --args="$(cat args.gn)"

      - name: Build Chromium
        run: |
          cd chromium/src
          autoninja -C out/arm webview_renderer_shell_apk

      - name: Extract .so files
        run: |
          mkdir -p artifacts
          find chromium/src/out/arm -name "lib*.so" -exec cp {} artifacts/ \; 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: chromium-armv7a
          path: artifacts/
          if-no-files-found: warn

  # ============================================================
  # Chromium: arm64-v8a
  # ============================================================
  build-chromium-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 git build-essential wget curl \
            lsb-release software-properties-common gnupg \
            libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 \
            libxdamage1 libxrandr2 libgbm1 libasound2 libpangocairo-1.0-0 \
            libgtk-3-0 ninja-build

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_ENV
          echo "PATH=${{ github.workspace }}/depot_tools:$PATH" >> $GITHUB_ENV

      - name: Fetch Chromium source
        run: |
          mkdir -p chromium && cd chromium
          fetch --nohooks --no-history chromium
          cd src && gclient runhooks

      - name: Configure Chromium for Android ARM64
        run: |
          cd chromium/src
          cat > args.gn << 'EOF'
          target_os = "android"
          target_cpu = "arm64"
          is_debug = false
          is_component_build = false
          symbol_level = 0
          enable_nacl = false
          proprietary_codecs = true
          ffmpeg_branding = "Chrome"
          use_openh264 = false
          is_clang = true
          treat_warnings_as_errors = false
          use_sysroot = false
          EOF
          gn gen out/arm64 --args="$(cat args.gn)"

      - name: Build Chromium
        run: |
          cd chromium/src
          autoninja -C out/arm64 webview_renderer_shell_apk

      - name: Extract .so files
        run: |
          mkdir -p artifacts
          find chromium/src/out/arm64 -name "lib*.so" -exec cp {} artifacts/ \; 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: chromium-arm64
          path: artifacts/
          if-no-files-found: warn

  # ============================================================
  # Упаковка APK
  # ============================================================
  package-apk:
    needs: [build-engine-armv7a, build-engine-arm64]
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Download engine armv7a
        uses: actions/download-artifact@v4
        with:
          name: engine-armv7a
          path: engine-armv7a/

      - name: Download engine arm64
        uses: actions/download-artifact@v4
        with:
          name: engine-arm64
          path: engine-arm64/

      - name: Download chromium armv7a (optional)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: chromium-armv7a
          path: chromium-armv7a/

      - name: Download chromium arm64 (optional)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: chromium-arm64
          path: chromium-arm64/

      - name: Checkout repo for launcher + content
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare jniLibs
        run: |
          # armeabi-v7a
          mkdir -p launcher/src/main/jniLibs/armeabi-v7a
          cp engine-armv7a/*.so launcher/src/main/jniLibs/armeabi-v7a/ 2>/dev/null || true
          # Заменяем заглушку Chromium настоящим (если есть)
          cp chromium-armv7a/libwebviewchromium.so launcher/src/main/jniLibs/armeabi-v7a/ 2>/dev/null || true

          # arm64-v8a
          mkdir -p launcher/src/main/jniLibs/arm64-v8a
          cp engine-arm64/*.so launcher/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
          cp chromium-arm64/libwebviewchromium.so launcher/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true

          echo "=== armv7a ==="
          ls -lh launcher/src/main/jniLibs/armeabi-v7a/
          echo "=== arm64 ==="
          ls -lh launcher/src/main/jniLibs/arm64-v8a/

      - name: Prepare garrysmod assets
        run: |
          mkdir -p launcher/src/main/assets/garrysmod

          # Копируем контент GMod
          cp -r garrysmod/garrysmod/* launcher/src/main/assets/garrysmod/ 2>/dev/null || true

          echo "=== Assets size ==="
          du -sh launcher/src/main/assets/garrysmod/

      - name: Download Gradle Wrapper
        working-directory: launcher
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4

      - name: Build APK
        working-directory: launcher
        run: ./gradlew assembleRelease --no-daemon

      - name: Find and rename APK
        run: |
          APK=$(find launcher -name "*.apk" -path "*/release/*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find launcher -name "*.apk" | head -1)
          fi
          if [ -n "$APK" ]; then
            cp "$APK" green-engine-gmod.apk
            ls -lh green-engine-gmod.apk
          else
            echo "ERROR: No APK found!"
            find launcher -name "*.apk"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: green-engine-gmod-apk
          path: green-engine-gmod.apk
          if-no-files-found: error
