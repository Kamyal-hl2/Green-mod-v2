name: Build Android Engine

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4

      - name: Checkout prebuilts (a-b-c)
        uses: actions/checkout@v4
        with:
          repository: nillerusr/a-b-c
          path: prebuilts
          depth: 1

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y python3 git build-essential wget unzip \
            libbz2-dev libbz2-dev:i386 libsdl2-dev libfreetype6-dev libfontconfig1-dev \
            libopenal-dev libjpeg-dev libpng-dev libcurl4-gnutls-dev \
            libedit-dev pkg-config g++-multilib libc6-dev-i386

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ndk/android-ndk-r10e
          key: android-ndk-r10e-v2

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ndk
          cd ndk
          wget -q --timeout=60 --tries=3 https://dl.google.com/android/repository/android-ndk-r10e-linux-x86_64.zip -O ndk.zip
          unzip -q ndk.zip
          rm ndk.zip

      - name: Setup Global Environment Variables
        run: |
          echo "ANDROID_NDK_HOME=${{ github.workspace }}/ndk/android-ndk-r10e" >> $GITHUB_ENV
          echo "PATH=${{ github.workspace }}/ndk/android-ndk-r10e/toolchains/arm-linux-androideabi-4.9/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV
          echo "NDK_BIN=${{ github.workspace }}/ndk/android-ndk-r10e/toolchains/arm-linux-androideabi-4.9/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV
          echo "SYSROOT=${{ github.workspace }}/ndk/android-ndk-r10e/platforms/android-21/arch-arm" >> $GITHUB_ENV

      - name: Build bzip2 for Android
        run: |
          wget -q https://sourceware.org/pub/bzip2/bzip2-1.0.8.tar.gz
          tar -xzf bzip2-1.0.8.tar.gz
          cd bzip2-1.0.8
          make libbz2.a \
            CC="$NDK_BIN/arm-linux-androideabi-gcc --sysroot=$SYSROOT" \
            AR="$NDK_BIN/arm-linux-androideabi-ar" \
            RANLIB="$NDK_BIN/arm-linux-androideabi-ranlib" \
            CFLAGS="-fPIC -O2 -Wall -Winline -D_FILE_OFFSET_BITS=64"
          
          mkdir -p ${{ github.workspace }}/engine/lib/android/arm
          cp libbz2.a ${{ github.workspace }}/engine/lib/android/arm/

      - name: Setup Thirdparty Prebuilts
        run: |
          mkdir -p ${{ github.workspace }}/engine/lib/android/arm
          
          # Создание файла librt.a с использованием ARM-архиватора из NDK
          $NDK_BIN/arm-linux-androideabi-ar rcs ${{ github.workspace }}/engine/lib/android/arm/librt.a
          
          # Копирование библиотек. Ошибки не подавляются для контроля структуры директорий
          cp -rn ${{ github.workspace }}/prebuilts/lib/armeabi-v7a-hard/* ${{ github.workspace }}/engine/lib/android/arm/
          cp -rn ${{ github.workspace }}/prebuilts/lib/armeabi-v7a/* ${{ github.workspace }}/engine/lib/android/arm/

      - name: Configure WAF
        working-directory: engine
        run: |
          unset CFLAGS CXXFLAGS LDFLAGS
          python3 waf configure -v -T release --togles --android=armeabi-v7a-hard,4.9,21

      - name: Build engine
        working-directory: engine
        run: |
          python3 waf build -v -j$(nproc)

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find engine/build -iname "*.so" -exec cp {} artifacts/ \; 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: engine-so-files
          path: artifacts/
          if-no-files-found: warn

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: engine/build/config.log
