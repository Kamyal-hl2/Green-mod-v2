name: Build Green Engine for GMod Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ============================================================
  # Engine: armeabi-v7a (32-bit ARM)
  # ============================================================
  build-engine-armv7a:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules
        run: |
          cd engine
          rm -rf thirdparty ivp
          git clone --depth 1 https://github.com/nillerusr/source-thirdparty.git thirdparty
          git clone --depth 1 https://github.com/nillerusr/source-physics.git ivp
          echo "=== thirdparty ==="
          ls thirdparty/ | head -5
          echo "=== ivp ==="
          ls ivp/ | head -5

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y python3 git build-essential wget unzip \
            libbz2-dev libbz2-dev:i386 libsdl2-dev libfreetype6-dev libfontconfig1-dev \
            libopenal-dev libjpeg-dev libpng-dev libcurl4-gnutls-dev \
            libedit-dev pkg-config g++-multilib libc6-dev-i386

      - name: Cache NDK r10e
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ndk/android-ndk-r10e
          key: android-ndk-r10e-v3

      - name: Download NDK r10e
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ndk && cd ndk
          wget -q --timeout=120 --tries=3 https://dl.google.com/android/repository/android-ndk-r10e-linux-x86_64.zip -O ndk.zip
          unzip -q ndk.zip && rm ndk.zip

      - name: Setup environment
        run: |
          echo "ANDROID_NDK_HOME=${{ github.workspace }}/ndk/android-ndk-r10e" >> $GITHUB_ENV
          echo "NDK_BIN=${{ github.workspace }}/ndk/android-ndk-r10e/toolchains/arm-linux-androideabi-4.9/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV
          echo "SYSROOT=${{ github.workspace }}/ndk/android-ndk-r10e/platforms/android-21/arch-arm" >> $GITHUB_ENV

      - name: Build bzip2
        run: |
          wget -q https://sourceware.org/pub/bzip2/bzip2-1.0.8.tar.gz
          tar -xzf bzip2-1.0.8.tar.gz && cd bzip2-1.0.8
          make libbz2.a \
            CC="$NDK_BIN/arm-linux-androideabi-gcc --sysroot=$SYSROOT" \
            AR="$NDK_BIN/arm-linux-androideabi-ar" \
            RANLIB="$NDK_BIN/arm-linux-androideabi-ranlib" \
            CFLAGS="-fPIC -O2 -Wall -Winline -D_FILE_OFFSET_BITS=64"
          mkdir -p ${{ github.workspace }}/engine/lib/android/arm
          cp libbz2.a ${{ github.workspace }}/engine/lib/android/arm/

      - name: Download prebuilt libraries
        run: |
          git clone --depth 1 https://github.com/nillerusr/source-engine-libs.git /tmp/prebuilts
          mkdir -p engine/lib/android/arm
          cp /tmp/prebuilts/android/arm/*.a engine/lib/android/arm/ 2>/dev/null || true
          cp /tmp/prebuilts/android/arm/*.so engine/lib/android/arm/ 2>/dev/null || true
          rm -rf /tmp/prebuilts
          echo "=== lib/android/arm ==="
          ls -lh engine/lib/android/arm/

      - name: Configure WAF
        working-directory: engine
        run: |
          unset CFLAGS CXXFLAGS LDFLAGS
          python3 waf configure -v -T release --togles --android=armeabi-v7a-hard,4.9,21 --disable-warns

      - name: Build engine
        working-directory: engine
        run: |
          python3 waf build -v -j$(nproc) 2>&1 | tee /tmp/build.log || {
            echo "=== BUILD FAILED — last 100 lines ==="
            tail -100 /tmp/build.log
            exit 1
          }

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find engine/build -iname "*.so" -exec cp {} artifacts/ \; 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: engine-armv7a
          path: artifacts/
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-armv7a
          path: engine/build/config.log

  # ============================================================
  # Engine: arm64-v8a (64-bit ARM)
  # ============================================================
  build-engine-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules
        run: |
          cd engine
          rm -rf thirdparty ivp
          git clone --depth 1 https://github.com/nillerusr/source-thirdparty.git thirdparty
          git clone --depth 1 https://github.com/nillerusr/source-physics.git ivp

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y python3 git build-essential wget unzip \
            libbz2-dev libbz2-dev:i386 libsdl2-dev libfreetype6-dev libfontconfig1-dev \
            libopenal-dev libjpeg-dev libpng-dev libcurl4-gnutls-dev \
            libedit-dev pkg-config g++-multilib libc6-dev-i386

      - name: Cache NDK r19c
        id: cache-ndk-r19c
        uses: actions/cache@v4
        with:
          path: ndk/android-ndk-r19c
          key: android-ndk-r19c-v2

      - name: Download NDK r19c
        if: steps.cache-ndk-r19c.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p ndk && cd ndk
          echo "Downloading NDK r19c (~786MB)..."
          wget --timeout=300 --tries=3 --progress=dot:giga \
            https://dl.google.com/android/repository/android-ndk-r19c-linux-x86_64.zip \
            -O ndk.zip
          echo "Download complete. Size:"
          ls -lh ndk.zip
          echo "Extracting..."
          unzip -q ndk.zip
          rm ndk.zip
          echo "NDK r19c extracted"
          ls android-ndk-r19c/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang

      - name: Setup environment
        run: |
          echo "ANDROID_NDK_HOME=${{ github.workspace }}/ndk/android-ndk-r19c" >> $GITHUB_ENV
          echo "NDK_BIN=${{ github.workspace }}/ndk/android-ndk-r19c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV
          echo "SYSROOT=${{ github.workspace }}/ndk/android-ndk-r19c/toolchains/llvm/prebuilt/linux-x86_64/sysroot" >> $GITHUB_ENV

      - name: Build bzip2
        run: |
          set -e
          wget -q https://sourceware.org/pub/bzip2/bzip2-1.0.8.tar.gz
          tar -xzf bzip2-1.0.8.tar.gz && cd bzip2-1.0.8
          CC="$NDK_BIN/aarch64-linux-android21-clang"
          CFLAGS="-fPIC -O2 -Wall -Winline -D_FILE_OFFSET_BITS=64"
          SRCS="blocksort.c bzip2.c bzlib.c compress.c crctable.c decompress.c huffman.c randtable.c"
          for f in $SRCS; do
            echo "Compiling $f..."
            $CC $CFLAGS -c "$f" -o "${f%.c}.o"
          done
          $NDK_BIN/llvm-ar rcs libbz2.a *.o
          echo "libbz2.a built:"
          ls -lh libbz2.a
          mkdir -p ${{ github.workspace }}/engine/lib/android/aarch64
          cp libbz2.a ${{ github.workspace }}/engine/lib/android/aarch64/

      - name: Download prebuilt libraries
        run: |
          git clone --depth 1 https://github.com/nillerusr/source-engine-libs.git /tmp/prebuilts
          mkdir -p engine/lib/android/aarch64
          cp /tmp/prebuilts/android/aarch64/*.a engine/lib/android/aarch64/ 2>/dev/null || true
          cp /tmp/prebuilts/android/aarch64/*.so engine/lib/android/aarch64/ 2>/dev/null || true
          rm -rf /tmp/prebuilts
          echo "=== lib/android/aarch64 ==="
          ls -lh engine/lib/android/aarch64/

      - name: Patch NDK r19c math.h for arm64 + API 21
        run: |
          set -e
          # NDK r19c bug: sources/android/support/include/math.h on line 32 includes
          # <c++/v1/math.h>, which then fails with:
          #   error: no member named 'fabsf' in the global namespace
          # because the C++ wrapper expects libc math symbols to already be in
          # global namespace (from sysroot libc <math.h>). For arm64 + API 21
          # the include order is broken.
          # Fix: replace the android/support/include/math.h shim with a passthrough
          # to the real libc <math.h> from the NDK unified sysroot.
          SUPPORT_MATH="${{ github.workspace }}/ndk/android-ndk-r19c/sources/android/support/include/math.h"
          if [ -f "$SUPPORT_MATH" ]; then
            echo "=== Before patch ==="
            head -40 "$SUPPORT_MATH"
            cp "$SUPPORT_MATH" "$SUPPORT_MATH.bak"
            cat > "$SUPPORT_MATH" <<'EOF'
          /* Patched by Green-mod-v2 CI to fix NDK r19c + arm64 + API 21 build.
           * Original shim included <c++/v1/math.h> directly, which broke C++ builds
           * because libc math symbols (fabsf, acosf, ...) were not yet declared in
           * the global namespace. The real libc <math.h> is in the unified sysroot:
           *   sysroot/usr/include/math.h
           * The compiler finds it automatically via the ndk wrapper without -I.
           */
          #ifndef _ANDROID_PATCHED_SUPPORT_MATH_H
          #define _ANDROID_PATCHED_SUPPORT_MATH_H
          #include_next <math.h>
          #endif
          EOF
            echo "=== After patch ==="
            cat "$SUPPORT_MATH"
          else
            echo "WARNING: support/include/math.h not found, skipping patch"
          fi

      - name: Configure WAF
        working-directory: engine
        run: |
          unset CFLAGS CXXFLAGS LDFLAGS
          python3 waf configure -v -T release --togles --android=aarch64,clang,21 --disable-warns

      - name: Build engine
        working-directory: engine
        run: |
          python3 waf build -v -j$(nproc) 2>&1 | tee /tmp/build.log || {
            echo "=== BUILD FAILED — last 100 lines ==="
            tail -100 /tmp/build.log
            exit 1
          }

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find engine/build -iname "*.so" -exec cp {} artifacts/ \; 2>/dev/null || true
          echo "=== Found .so files in engine/build ==="
          find engine/build -iname "*.so" | head -30
          echo "=== artifacts/ contents ==="
          ls -lh artifacts/ || echo "artifacts/ is empty!"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: engine-arm64
          path: artifacts/
          if-no-files-found: error
          overwrite: true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-arm64
          path: engine/build/config.log

  # ============================================================
  # Chromium: placeholder — real Chromium downloaded at runtime
  # ============================================================
  build-chromium:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Create chromium placeholder
        run: |
          mkdir -p artifacts
          echo "runtime-download-required" > artifacts/chromium-status.txt
          echo "Chromium .so files (if any) are downloaded at first launch by the engine"
          ls -lh artifacts/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: chromium-armv7a
          path: artifacts/
          if-no-files-found: warn

  # ============================================================
  # Package APK (engine only, no chromium in APK)
  # ============================================================
  package-apk:
    needs: [build-engine-armv7a, build-engine-arm64]
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout repo for launcher + content
        uses: actions/checkout@v4

      - name: Download engine armv7a (CI-built)
        uses: actions/download-artifact@v4
        with:
          name: engine-armv7a
          path: engine-armv7a/

      - name: Download engine arm64 (CI-built)
        uses: actions/download-artifact@v4
        with:
          name: engine-arm64
          path: engine-arm64/

      - name: Verify downloads
        run: |
          echo "=== engine-armv7a ==="
          ls engine-armv7a/*.so 2>/dev/null | wc -l
          echo "=== engine-arm64 ==="
          ls engine-arm64/*.so 2>/dev/null | wc -l

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare jniLibs
        run: |
          set -e

          # NOTE: build.gradle already pulls .so from engine/lib/<abi>/ and
          # engine/lib/android/<arm|aarch64>/ via jniLibs.srcDirs, so even an
          # empty launcher/src/main/jniLibs/ produces a working APK. The jniLibs/
          # dir below is only used to OVERRIDE prebuilts with freshly CI-built .so.

          # armeabi-v7a: CI-built override + prebuilt fallback (combined)
          mkdir -p launcher/src/main/jniLibs/armeabi-v7a
          cp engine/lib/android/arm/*.so        launcher/src/main/jniLibs/armeabi-v7a/ 2>/dev/null || true
          cp engine/lib/armeabi-v7a/*.so        launcher/src/main/jniLibs/armeabi-v7a/ 2>/dev/null || true
          cp engine-armv7a/*.so                 launcher/src/main/jniLibs/armeabi-v7a/ 2>/dev/null || true
          ARMV7A_COUNT=$(ls launcher/src/main/jniLibs/armeabi-v7a/*.so 2>/dev/null | wc -l)
          echo "armv7a total (prebuilt+CI): ${ARMV7A_COUNT} .so files"

          # arm64-v8a: CI-built override + prebuilt fallback (combined)
          mkdir -p launcher/src/main/jniLibs/arm64-v8a
          cp engine/lib/android/aarch64/*.so    launcher/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
          cp engine/lib/arm64-v8a/*.so          launcher/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
          cp engine-arm64/*.so                  launcher/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
          ARM64_COUNT=$(ls launcher/src/main/jniLibs/arm64-v8a/*.so 2>/dev/null | wc -l)
          echo "arm64 total (prebuilt+CI): ${ARM64_COUNT} .so files"

          ARMV7A_FINAL=$(ls launcher/src/main/jniLibs/armeabi-v7a/*.so 2>/dev/null | wc -l)
          ARM64_FINAL=$(ls launcher/src/main/jniLibs/arm64-v8a/*.so 2>/dev/null | wc -l)
          echo "=== Final: armv7a=${ARMV7A_FINAL}, arm64=${ARM64_FINAL} ==="
          echo "=== Total jniLibs size ==="
          du -sh launcher/src/main/jniLibs/

          if [ "$ARMV7A_FINAL" -eq 0 ]; then
            echo "ERROR: No armv7a .so files found!"
            exit 1
          fi
          if [ "$ARM64_FINAL" -eq 0 ]; then
            echo "ERROR: No arm64 .so files found!"
            exit 1
          fi

      - name: Prepare garrysmod assets
        run: |
          # extras_dir.vpk is shipped in launcher/src/main/assets/ (committed, ~25MB)
          # and is extracted by ExtractAssets.extractVPK at first launch.
          # Additional garrysmod content (lua/gamemodes/addons) is optional and
          # only copied here if present in the repo's garrysmod/ tree.
          ls -lh launcher/src/main/assets/ 2>/dev/null || true
          if [ -d garrysmod/garrysmod ]; then
            mkdir -p launcher/src/main/assets/garrysmod
            cp -r garrysmod/garrysmod/* launcher/src/main/assets/garrysmod/ 2>/dev/null || true
            echo "=== garrysmod assets size ==="
            du -sh launcher/src/main/assets/garrysmod/
          else
            echo "garrysmod/ tree not present in repo; engine will read it from the user-set gamepath at runtime"
          fi

      - name: Setup Gradle Wrapper
        working-directory: launcher
        run: |
          # gradle-wrapper.jar is not committed — generate it
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/
            /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
            rm -rf /tmp/gradle-8.4 /tmp/gradle.zip
          fi

      - name: Build APK
        working-directory: launcher
        run: ./gradlew assembleDebug --no-daemon

      - name: Find and rename APK
        run: |
          APK=$(find launcher -name "*.apk" -path "*/debug/*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find launcher -name "*.apk" -path "*/release/*" | head -1)
          fi
          if [ -z "$APK" ]; then
            APK=$(find launcher -name "*.apk" | head -1)
          fi
          if [ -n "$APK" ]; then
            cp "$APK" green-engine-gmod.apk
            echo "=== APK size ==="
            ls -lh green-engine-gmod.apk
            SIZE_MB=$(du -m green-engine-gmod.apk | cut -f1)
            echo "APK size: ${SIZE_MB} MB"
            if [ "$SIZE_MB" -gt 1000 ]; then
              echo "WARNING: APK exceeds 1GB!"
            fi
          else
            echo "ERROR: No APK found!"
            find launcher -name "*.apk"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: green-engine-gmod-apk
          path: green-engine-gmod.apk
          if-no-files-found: error
